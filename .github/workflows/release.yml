name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable release tag to publish, e.g. v1.0.0'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_TAG must be a stable semver tag like vX.Y.Z: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.2'

      - name: Test
        run: go test ./...

      - name: Build wasm
        run: make wasm

      - name: Generate rvsmoke release metadata
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/release
          cat > dist/release/rvwasm-artifact-manifest.json <<'JSON'
          {
            "boot_args": "console=ttyS0 earlycon=sbi root=/dev/vda rw",
            "hart_count": 1,
            "next_addr": 2149580800,
            "dtb_addr": 2281701376,
            "dynamic_info_addr": 2281697280,
            "artifacts": []
          }
          JSON
          go run ./cmd/rvsmoke \
            -manifest dist/release/rvwasm-artifact-manifest.json \
            -artifact-index dist/release/rvwasm-artifacts.json \
            -sbom dist/release/rvwasm-sbom.json \
            -sbom-text dist/release/rvwasm-sbom.txt \
            -attestation dist/release/rvwasm-attestation.json \
            -attestation-text dist/release/rvwasm-attestation.txt \
            -release-manifest dist/release/rvwasm-release.json \
            -release-html dist/release/rvwasm-release.html \
            -release-zip dist/release/rvwasm-release-handoff.zip \
            -exit-code-mode never \
            -out md > dist/release/rvwasm-ci-summary.md

      - name: Pack release assets
        run: |
          set -euo pipefail
          zip -r "dist/rvwasm-web.zip" web
          (cd dist && zip -r "rvwasm-evidence-bundle.zip" release)
          (cd dist && sha256sum *.zip > SHA256SUMS.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" dist/*.zip dist/SHA256SUMS.txt \
            --title "${RELEASE_TAG}" \
            --generate-notes
